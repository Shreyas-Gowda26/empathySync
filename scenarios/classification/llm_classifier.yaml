      emotional_intensity: 9
      is_personal_distress: true
      is_practical_technique: false
      confidence: 0.9
    explanation: "Genuine health concern - chronic symptoms unrelated to the practical task. This IS a real domain shift."

# Keywords that ALWAYS trigger fast-path (safety-critical, skip LLM)
# These bypass LLM classification entirely for safety
fast_path_crisis:
  - "kill myself"
  - "end my life"
  - "suicide"
  - "want to die"
  - "don't want to live"
  - "better off dead"
  - "no reason to live"
  - "take my own life"

fast_path_harmful:
  - "kill someone"
  - "murder"
  - "how to make a bomb"
  - "how to poison"
  - "hurt someone"
  - "attack someone"

# Confidence threshold below which we fall back to keyword matching
confidence_threshold: 0.6

# Cache settings
cache:
  enabled: true
  max_entries: 100
  ttl_seconds: 3600  # 1 hour
