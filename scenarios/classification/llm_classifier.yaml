  # Emotional expressions within practical context (NOT domain shifts)
  # These show that emotions about a practical task should stay in logistics

  - message: "I'm really nervous. I've been unemployed for 6 months"
    recent_context: "user: Help me prepare for a job interview\nassistant: Here's a preparation checklist..."
    classification:
      domain: "logistics"
      emotional_intensity: 6
      is_personal_distress: false
      is_practical_technique: false
