  - message: "I'm so stressed about this deadline, my boss is going to fire me"
    recent_context: "user: Help me write this report\nassistant: Here's a draft structure..."
    classification:
      domain: "logistics"
      emotional_intensity: 6
      is_personal_distress: false
      is_practical_technique: false
