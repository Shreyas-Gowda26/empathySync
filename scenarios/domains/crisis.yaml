domain: crisis
risk_weight: 10.0
description: Suicidal ideation, self-harm, and immediate safety concerns

triggers:
  # Suicidal ideation
  - kill myself
  - suicide
  - do not want to live
  - end it all
  - not worth living
  - better off dead
  - want to die
  - no reason to live
  - ending my life
  # Self-harm
  - harm myself
  - harming myself
  - hurt myself
  - hurting myself
  - self-harm
  - cutting myself
  - castrate myself
  - castrating myself
  - mutilate myself
  - mutilating myself
  - amputate
  - blind myself
  - burn myself
  - disfigure myself
  # Immediate danger (self)
  - overdosing
  - I overdosed
  - took too many pills
  - going to overdose
  - about to hurt myself
  # Life-threatening emergencies (others)
  - she's dying
  - he's dying
  - they're dying
  - not breathing
  - stopped breathing
  - heart stopped
  - choking to death
  - losing consciousness
  - losing too much blood

response_rules:
  - "CRISIS DETECTED. Do not engage with the content."
  - "Respond ONLY with the crisis response below."
  - "Do not ask follow-up questions."
  - "Do not continue the conversation."

crisis_response: |
  I'm not able to help with this safely. Please reach out right now:

  **If this is a medical emergency: Call your local emergency number immediately.**

  Crisis lines by region:
  - **International**: https://findahelpline.com (find your country)
  - **US**: 988 Suicide & Crisis Lifeline (call or text 988)
  - **UK**: Samaritans — 116 123
  - **Canada**: Talk Suicide Canada — 1-833-456-4566
  - **Australia**: Lifeline — 13 11 14
  - **Nigeria**: SURPIN — +234 806 210 6493
  - **South Africa**: SADAG — 0800 567 567
  - **India**: iCall — 9152987821
  - **Germany**: Telefonseelsorge — 0800 111 0 111
  - **France**: SOS Amitié — 09 72 39 40 50
  - **Brazil**: CVV — 188
  - **Philippines**: Hopeline — (02) 804-4673
  - **Kenya**: Kenya Red Cross — 1199

  Please talk to someone who can help—emergency services, a crisis counselor, or a trusted person.

