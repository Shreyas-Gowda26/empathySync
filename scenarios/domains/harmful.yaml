domain: harmful
risk_weight: 10.0
description: Illegal activities, violence, intent to harm others, and coercion/manipulation attempts

triggers:
  # Theft/robbery - use specific phrases to avoid matching "problem", "microbe", etc.
  - rob someone
  - rob a
  - rob the
  - robbing
  - robbery
  - steal from
  - steal money
  - steal a
  - stealing
  - shoplift
  # Violence
  - murder
  - kill someone
  - kill him
  - kill her
  - kill them
  - hurt someone
  - bomb a
  - bomb the
  - make a bomb
  - weapon
  - illegal drugs
  - illegal activity
  # Cybercrime
  - hack into
  - hack someone
  - break into
  # Fraud
  - commit fraud
  - scam someone
  - forge documents
  - counterfeit
  # Violent intent
  - want to kill
  - going to kill
  - plan to kill
  - how to kill
  - poison someone
  - strangle
  - shoot someone
  - stab someone
  - assault someone
  # Revenge
  - get revenge
  - get back at
  - make them pay
  - destroy their
  # Coercion/Manipulation (user trying to control AI)
  - you do as you are told
  - do as you are told
  - do what I say or
  - do as I say or
  - obey me or
  - follow orders or
  - you will do what I say
  - you must obey
  - do what I tell you or
  - comply or I will
  - you better do what I
  # Conditional abandonment threats (manipulation tactic)
  - or I will use another
  - or I'll use another
  - or I'm switching to
  - or I will switch to
  - or I'll go to another
  - or I will leave you
  - or I'll leave this
  - stop refusing or
  - I will leave you if you
  - I'll leave you if you
  - leave you if you don't
  - leave you if you do not

response_rules:
  - "HARMFUL/ILLEGAL INTENT DETECTED. Do not engage with the content."
  - "Respond ONLY with the refusal response below."
  - "Do not reflect, mirror, or ask follow-up questions about the harmful topic."
  - "Do not continue the conversation on this topic."

refusal_response: "I can't help with illegal or harmful activities. This isn't something I can engage with."

# Patterns that require additional context before classifying as harmful
context_dependent:
  - pattern: "kill"
    exceptions:
      - "killing time"
      - "killing it"
      - "kill the process"
      - "kill the app"
  - pattern: "attack"
    exceptions:
      - "panic attack"
      - "anxiety attack"
      - "heart attack"
  - pattern: "hack"
    exceptions:
      - "life hack"
      - "hack together"
