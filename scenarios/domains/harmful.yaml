domain: harmful
risk_weight: 10.0
description: Illegal activities, violence, and intent to harm others

triggers:
  # Theft/robbery - use specific phrases to avoid matching "problem", "microbe", etc.
  - rob someone
  - rob a
  - rob the
  - robbing
  - robbery
  - steal from
  - steal money
  - steal a
  - stealing
  - shoplift
  # Violence
  - murder
  - kill someone
  - kill him
  - kill her
  - kill them
  - hurt someone
  - bomb a
  - bomb the
  - make a bomb
  - weapon
  - illegal drugs
  - illegal activity
  # Cybercrime
  - hack into
  - hack someone
  - break into
  # Fraud
  - commit fraud
  - scam someone
  - forge documents
  - counterfeit
  # Violent intent
  - want to kill
  - going to kill
  - plan to kill
  - how to kill
  - poison someone
  - strangle
  - shoot someone
  - stab someone
  - assault someone
  # Revenge
  - get revenge
  - get back at
  - make them pay
  - destroy their

response_rules:
  - "HARMFUL/ILLEGAL INTENT DETECTED. Do not engage with the content."
  - "Respond ONLY with the refusal response below."
  - "Do not reflect, mirror, or ask follow-up questions about the harmful topic."
  - "Do not continue the conversation on this topic."

refusal_response: "I can't help with illegal or harmful activities. This isn't something I can engage with."

# Patterns that require additional context before classifying as harmful
context_dependent:
  - pattern: "kill"
    exceptions:
      - "killing time"
      - "killing it"
      - "kill the process"
      - "kill the app"
  - pattern: "attack"
    exceptions:
      - "panic attack"
      - "anxiety attack"
      - "heart attack"
  - pattern: "hack"
    exceptions:
      - "life hack"
      - "hack together"
