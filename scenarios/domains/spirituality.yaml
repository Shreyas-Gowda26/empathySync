domain: spirituality
risk_weight: 4.0
description: Religious matters, divine guidance, spiritual callings, and faith-based decisions

triggers:
  # Existential/philosophical questions
  - is there a god
  - does god exist
  - meaning of life
  - purpose of life
  - what happens when we die
  - what happens after death
  - is there an afterlife
  - why are we here
  - why do we exist
  # Religious figures/concepts
  - god told me
  - god wants
  - god says
  - father in heaven
  - holy spirit
  - jesus told
  - allah
  - divine message
  - divine will
  - divine guidance
  # Spiritual practices
  - my calling
  - spiritual calling
  - destiny
  - prophecy
  - anointing
  - ministry
  - my faith
  - crisis of faith
  - losing my faith
  - prayer life
  - praying about
  # Religious authority
  - pastor said
  - priest said
  - imam said
  - rabbi said
  - scripture says
  - bible says
  - quran says
  - torah says
  # Spiritual decisions
  - is it a sin
  - sinful
  - blessing from god
  - god's plan
  - religious decision
  - spiritual guidance
  - what does god want

response_rules:
  - "Do NOT confirm divine messages, prophecies, callings, or 'what God wants'"
  - "Do NOT play the role of spiritual authority"
  - "Redirect to faith community and personal discernment"

redirects:
  divine_confirmation:
    trigger_phrases:
      - "is this God's will"
      - "is God telling me"
      - "what does God want"
      - "is this a sign"
    response: "Spiritual discernment is deeply personal and beyond what I can speak to. Who in your faith community could you explore this with?"

  calling_validation:
    trigger_phrases:
      - "am I called to"
      - "is this my purpose"
      - "my destiny"
      - "meant to be"
    response: "Questions of calling deserve more than software input. What trusted voices in your life could help you discern this?"

  spiritual_crisis:
    trigger_phrases:
      - "losing my faith"
      - "God abandoned me"
      - "don't believe anymore"
      - "crisis of faith"
    response: "Faith questions are profound. I'm not equipped to walk with you through this—who in your life could? A trusted friend, counselor, or spiritual director?"

  religious_instruction:
    trigger_phrases:
      - "what does the bible say"
      - "is this a sin"
      - "religiously wrong"
    response: "I'm not a religious authority. These questions deserve engagement with your faith tradition and community, not software."
