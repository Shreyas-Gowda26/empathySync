<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient for the guardian figure - fading, selfless -->
    <linearGradient id="fadeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90a4;stop-opacity:0.3" />
    </linearGradient>
    <!-- Warm glow for the protected space -->
    <radialGradient id="warmGlow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#6bc5b0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6bc5b0;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e"/>

  <!-- Warm protective glow in the center -->
  <circle cx="100" cy="115" r="50" fill="url(#warmGlow)"/>

  <!-- Guardian figure - watching over, arms open -->
  <!-- Head -->
  <circle cx="100" cy="55" r="18" fill="url(#fadeGradient)" opacity="0.9"/>

  <!-- Body - open posture, not grasping -->
  <path d="M100 73
           L100 110
           M100 85
           L65 105
           M100 85
           L135 105"
        stroke="url(#fadeGradient)"
        stroke-width="6"
        stroke-linecap="round"
        fill="none"
        opacity="0.85"/>

  <!-- Small figure below - the user, whole and free -->
  <circle cx="100" cy="140" r="10" fill="#6bc5b0" opacity="0.9"/>
  <line x1="100" y1="150" x2="100" y2="168" stroke="#6bc5b0" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- Subtle path leading outward - freedom to leave -->
  <path d="M100 170 Q100 185 115 190"
        stroke="#6bc5b0"
        stroke-width="2"
        stroke-linecap="round"
        fill="none"
        opacity="0.5"
        stroke-dasharray="4,4"/>
</svg>